<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Stride" />
<link rel="apple-touch-icon" href="assets/icon.png" />
<title>STRIDE</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --text:#F4F4F5; --text-dim:#D4D4DE; --text-faint:#ACACB8;
    --accent:#FF6A2C; --accent-2:#FFA63D; --good:#4ADE80;
    /* per-card tones — greater use of colour across the cards */
    --c-act:#FF7A3C;   --c-act2:#FFB347;
    --c-sleep:#8B9BFF; --c-sleep2:#B79BFF;
    --c-gym:#3FE0A0;   --c-gym2:#86E88A;
    --c-walk:#FFC24B;  --c-walk2:#FF9A3D;
    --bg-img:url('assets/meadow.jpg');   /* poster + fallback; swap to track.jpg */
    --glass:rgba(17,18,22,.50); --glass-line:rgba(255,255,255,.14); --inset:rgba(255,255,255,.10);
    --r-card:14px; --r-el:5px; --r-chip:9px; --gap:18px; --pad:22px;
    --font:"Inter Tight","Inter",system-ui,-apple-system,sans-serif;
    --sky-top:rgba(8,12,30,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--font); font-weight:400; color:var(--text); font-variant-numeric:tabular-nums;
    -webkit-font-smoothing:antialiased; min-height:100%; background:#0c0d10;
    padding:max(22px,env(safe-area-inset-top)) clamp(16px,3vw,34px) 30px;
  }
  /* alive background: video (or photo poster) + time-of-day sky tint */
  #bgvideo{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:-3;
    background:var(--bg-img) center/cover no-repeat;}
  #sky{position:fixed;inset:0;z-index:-2;pointer-events:none;transition:background 4s linear;
    background:
      linear-gradient(180deg, rgba(8,9,11,.42) 0%, transparent 13%),
      linear-gradient(180deg, var(--sky-top) 0%, transparent 46%),
      linear-gradient(180deg, transparent 34%, rgba(8,9,11,.5) 78%, rgba(8,9,11,.84) 100%);}

  .num{font-weight:500;line-height:.95}
  .label{font-size:12px;text-transform:uppercase;letter-spacing:.1em;font-weight:500;color:var(--text-dim)}
  .unit{color:var(--text-faint);font-weight:400}
  .tag{font-size:11px;color:var(--text-faint);font-weight:400;letter-spacing:.04em}

  header{display:flex;justify-content:space-between;align-items:baseline;gap:16px;margin:2px 4px 18px}
  .date{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-faint);font-weight:400}
  .status{font-size:clamp(17px,2.2vw,24px);font-weight:500;margin-top:2px}
  .status b{color:var(--accent-2);font-weight:500}
  .wordmark{font-size:12px;letter-spacing:.36em;font-weight:500;color:var(--text-faint)}

  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:var(--gap)}
  .card{
    background:var(--glass);
    background:linear-gradient(160deg, rgba(8,9,12,.32), rgba(8,9,12,.04) 62%), color-mix(in srgb, var(--ca,#9a9aa6) 7%, var(--glass));
    backdrop-filter:blur(30px) saturate(155%) brightness(.86); -webkit-backdrop-filter:blur(30px) saturate(155%) brightness(.86);
    border:1px solid var(--glass-line); border-radius:var(--r-card); padding:var(--pad); position:relative; overflow:hidden;
    text-shadow:0 1px 2px rgba(0,0,0,.4);
    box-shadow:inset 0 1px 0 var(--inset), 0 24px 60px -30px rgba(0,0,0,.92);
    box-shadow:inset 0 2px 0 color-mix(in srgb, var(--ca,#fff) 42%, transparent), inset 0 1px 0 var(--inset), 0 24px 60px -30px rgba(0,0,0,.92);
  }
  .chead{display:flex;align-items:center;gap:11px;margin-bottom:14px}
  .chip{width:36px;height:36px;border-radius:var(--r-chip);display:grid;place-items:center;font-size:17px;
    background:linear-gradient(150deg,var(--ca,#888),var(--cb,#555));box-shadow:inset 0 1px 0 rgba(255,255,255,.25), 0 4px 12px -4px var(--ca,transparent)}
  .ctitle{font-size:15px;font-weight:500}
  .chead .tag{margin-left:auto}

  /* placement */
  .activity{--ca:var(--c-act);--cb:var(--c-act2);grid-column:1 / 4}
  .sleep{--ca:var(--c-sleep);--cb:var(--c-sleep2);grid-column:4 / 7}
  .gym{--ca:var(--c-gym);--cb:var(--c-gym2);grid-column:7 / 10}
  .hero{grid-column:10 / 13; grid-row:1 / 3; display:flex;flex-direction:column}
  .walk{--ca:var(--c-walk);--cb:var(--c-walk2);grid-column:1 / 6}
  .clock{--ca:var(--accent);--cb:var(--accent-2);grid-column:6 / 10}

  .big{font-size:clamp(34px,4vw,46px)}
  .row{display:flex;align-items:baseline;gap:8px}

  /* activity — cumulative steps area toward goal */
  .chart{margin-top:12px;width:100%;height:50px;display:block}
  .dist{margin-top:10px;color:var(--text-dim);font-size:13px;font-weight:400}
  .dist b{color:var(--text);font-weight:500}

  /* sleep */
  .delta{font-size:13px;font-weight:500;color:var(--good)}
  .delta.down{color:var(--accent-2)}
  .note{font-size:11px;color:var(--text-faint);font-weight:400;text-transform:uppercase;letter-spacing:.05em;margin-top:8px}

  /* gym — segmented progress ring */
  .gym .body{display:flex;align-items:center;gap:18px}
  .gring{position:relative;flex:0 0 auto}
  .gring .center{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
  .gring .center .num{font-size:26px}
  .gring .center .num .sub{font-size:.5em;color:var(--text-faint)}
  .gym .foot{color:var(--text-dim);font-size:14px;font-weight:400}

  /* hero gauge */
  .hero{align-items:center;justify-content:center;text-align:center;gap:6px;
    background:linear-gradient(160deg, rgba(8,9,12,.30), rgba(8,9,12,.04) 62%), linear-gradient(165deg,rgba(255,255,255,.09),rgba(255,255,255,.02))}
  .hero .iconrow{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:6px}
  .hero .ic{width:30px;height:30px;border-radius:var(--r-chip);display:grid;place-items:center;font-size:13px;
    background:rgba(255,255,255,.07);border:1px solid var(--glass-line);opacity:.7}
  .gauge{width:100%;max-width:240px;margin-top:auto}
  .gwrap{position:relative}
  .gval{position:absolute;left:0;right:0;top:46%;transform:translateY(-50%)}
  .gval .num{font-size:clamp(40px,4.4vw,54px)}
  .gval .pct{font-size:.5em;color:var(--text-faint);font-weight:400}
  .gcap{font-size:18px;font-weight:500;margin-top:2px}
  .gsub{font-size:12px;color:var(--text-faint);font-weight:400;margin-bottom:6px}

  /* walk — ring + 7-day history */
  .walk .body{display:flex;align-items:center;gap:20px}
  .ring{flex:0 0 auto}
  .walk .state{font-size:28px;font-weight:500}
  .walk .state.done{color:var(--good)}
  .walk .sub{color:var(--text-faint);font-size:13px;font-weight:400;margin-top:4px}
  .week{display:flex;gap:7px;margin-left:auto;text-align:center}
  .week .d{display:flex;flex-direction:column;align-items:center;gap:6px}
  .week .dot{width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.12)}
  .week .dot.on{background:linear-gradient(150deg,var(--ca),var(--cb))}
  .week .dot.today{outline:2px solid rgba(255,255,255,.5);outline-offset:2px}
  .week .dl{font-size:10px;color:var(--text-faint);text-transform:uppercase;font-weight:400}
  .walk .streak{display:flex;flex-direction:column;align-items:flex-start}
  .walk .streak .num{font-size:30px}
  .walk .streak .lbl{font-size:12px;color:var(--text-faint);font-weight:400;margin-top:2px}

  /* movement clock */
  .bars{display:flex;align-items:flex-end;gap:4px;height:56px;margin-bottom:6px}
  .bars > span{flex:1;background:rgba(255,255,255,.12);border-radius:var(--r-el) var(--r-el) 0 0;min-height:2px;transition:height .65s cubic-bezier(.34,1.25,.64,1)}
  .bars > span.peak{background:linear-gradient(180deg,var(--cb),var(--ca))}
  .bars > span.now{outline:2px solid rgba(255,255,255,.45);outline-offset:1px}
  .axis{display:flex;justify-content:space-between;font-size:11px;color:var(--text-faint);font-weight:400;margin-bottom:12px}
  .clock .foot{color:var(--text-dim);font-size:14px;font-weight:400}
  .clock .foot b{color:var(--accent-2);font-weight:500}

  .stale{display:none;margin:14px 4px 0;font-size:12px;color:var(--text-faint);text-align:center}
  .stale.show{display:block}

  @media (max-width:980px){
    .activity,.sleep,.gym,.walk,.clock{grid-column:span 6}
    .hero{grid-column:span 6;grid-row:auto}
  }
  @media (max-width:560px){ .grid>*{grid-column:1 / -1 !important} }

  @view-transition{ navigation:auto; }
  .card{opacity:0;transform:translateY(10px) scale(.985);filter:blur(7px);animation:rise .55s cubic-bezier(.22,.85,.3,1) forwards}
  .grid>.card:nth-child(2){animation-delay:.06s}.grid>.card:nth-child(3){animation-delay:.12s}
  .grid>.card:nth-child(4){animation-delay:.18s}.grid>.card:nth-child(5){animation-delay:.24s}.grid>.card:nth-child(6){animation-delay:.3s}
  @keyframes rise{to{opacity:1;transform:none;filter:blur(0)}}
  .silent .card{animation:none!important;opacity:1!important;transform:none!important;filter:none!important}
  @media (prefers-reduced-motion:reduce){
    .card{animation:none;opacity:1;transform:none;filter:none}#sky{transition:none}*{transition:none!important}
    ::view-transition-old(*),::view-transition-new(*){animation:none!important}
  }

  /* celebration moments — fire once per real event */
  .ring.celebrate{animation:ringPulse .85s cubic-bezier(.2,.8,.3,1) .25s}
  @keyframes ringPulse{0%,100%{filter:none;transform:scale(1)}45%{filter:drop-shadow(0 0 12px var(--good));transform:scale(1.07)}}
  .hero.celebrate{animation:cardGlow 1.5s ease-out .3s}
  @keyframes cardGlow{0%,100%{box-shadow:inset 0 1px 0 var(--inset),0 24px 60px -30px rgba(0,0,0,.92)}40%{box-shadow:inset 0 1px 0 var(--inset),0 0 0 1px var(--accent),0 0 44px -6px var(--accent)}}
  .streak.celebrate .num{animation:popNum .85s cubic-bezier(.2,.8,.3,1) .3s}
  @keyframes popNum{0%,100%{transform:scale(1);color:var(--text)}45%{transform:scale(1.16);color:var(--accent-2)}}
  @media (prefers-reduced-motion:reduce){.ring.celebrate,.hero.celebrate,.streak.celebrate .num{animation:none}}

  /* click-to-expand overlay */
  .card[role=button]{cursor:pointer}
  .card[role=button]:focus-visible{outline:2px solid var(--accent-2);outline-offset:3px}
  #overlay{position:fixed;inset:0;z-index:50;display:grid;place-items:center;padding:24px;
    background:rgba(6,7,9,.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);animation:ovin .25s ease}
  #overlay[hidden]{display:none}
  @keyframes ovin{from{opacity:0}to{opacity:1}}
  #overlay .sheet{width:min(720px,94vw);max-height:88vh;overflow:auto;border-radius:16px;padding:24px;
    background:linear-gradient(160deg,rgba(8,9,12,.42),rgba(8,9,12,.1)), color-mix(in srgb, var(--ca,#9a9aa6) 9%, rgba(17,18,22,.9));
    border:1px solid var(--glass-line);text-shadow:0 1px 2px rgba(0,0,0,.4);
    box-shadow:inset 0 2px 0 color-mix(in srgb,var(--ca,#fff) 42%,transparent), 0 40px 100px -30px rgba(0,0,0,.9);
    animation:sheetin .3s cubic-bezier(.2,.85,.3,1)}
  @keyframes sheetin{from{transform:translateY(12px) scale(.985);opacity:0}to{transform:none;opacity:1}}
  @media (prefers-reduced-motion:reduce){#overlay,#overlay .sheet{animation:none}}
  .ovhead{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .ovhead h2{font-size:19px;font-weight:500;flex:1}
  #ovClose{width:34px;height:34px;border-radius:9px;border:1px solid var(--glass-line);background:rgba(255,255,255,.06);color:var(--text);font-size:13px;cursor:pointer}
  #ovClose:hover{background:rgba(255,255,255,.12)}
  .ovstats{display:flex;gap:24px;flex-wrap:wrap;margin-top:18px}
  .ovstat .n{font-size:24px;font-weight:500;line-height:1}
  .ovstat .l{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.07em;margin-top:4px}
  .ovbars{display:flex;align-items:flex-end;gap:5px;height:130px;margin-top:4px}
  .ovbars .b{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;justify-content:flex-end;height:100%}
  .ovbars .bar{width:100%;border-radius:5px 5px 0 0;background:linear-gradient(180deg,var(--cb),var(--ca));min-height:2px}
  .ovbars .bar.dim{background:rgba(255,255,255,.13)}
  .ovbars .bl{font-size:10px;color:var(--text-faint);height:12px}
  .heat{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,1fr);gap:5px;margin-top:6px;justify-content:start}
  .heat .c{width:15px;height:15px;border-radius:4px;background:rgba(255,255,255,.10)}
  .heat .c.on{background:linear-gradient(150deg,var(--ca),var(--cb))}
  .ovrow{display:flex;justify-content:space-between;align-items:center;font-size:14px;color:var(--text-dim)}
  .ovrow b{color:var(--text);font-weight:500}
  .compbar{height:9px;border-radius:5px;background:rgba(255,255,255,.12);overflow:hidden;margin:7px 0 16px}
  .compbar > i{display:block;height:100%;border-radius:5px}
  .ovtabs{display:flex;gap:6px;margin-bottom:16px}
  .ovtab{padding:6px 12px;border-radius:8px;border:1px solid var(--glass-line);background:rgba(255,255,255,.05);color:var(--text-dim);font:inherit;font-size:12px;font-weight:500;cursor:pointer}
  .ovtab.on{background:linear-gradient(150deg,var(--ca),var(--cb));color:#0c0d10;border-color:transparent}
  .shelf{display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:12px;margin-top:10px}
  .trophy{text-align:center;padding:12px 6px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid var(--glass-line)}
  .trophy .te{font-size:30px;line-height:1}
  .trophy .tl{font-size:10px;color:var(--text-dim);margin-top:6px}
  .trophy.locked{opacity:.32;filter:grayscale(1)}
  .heat.yr{grid-template-rows:repeat(7,9px)}
  .heat.yr .c{width:9px;height:9px;border-radius:2px}
</style>
</head>
<body>
  <video id="bgvideo" autoplay muted loop playsinline poster="assets/meadow.jpg">
    <source src="assets/bg.mp4" type="video/mp4" />
  </video>
  <div id="sky"></div>

  <header>
    <div>
      <div class="date" id="date">—</div>
      <div class="status" id="status">Let’s move.</div>
    </div>
    <div class="wordmark">STRIDE</div>
  </header>

  <main class="grid">
    <!-- ACTIVITY -->
    <section class="card activity">
      <div class="chead"><div class="chip">🏃</div><div class="ctitle">Activity</div><div class="tag">Today</div></div>
      <div class="row"><span class="num big" id="steps">0</span><span class="unit" id="stepsGoal">/ 8,000</span></div>
      <svg class="chart" id="actChart" viewBox="0 0 100 50" preserveAspectRatio="none" aria-hidden="true"></svg>
      <div class="dist">Distance <b id="dist">—</b> km</div>
    </section>

    <!-- SLEEP -->
    <section class="card sleep">
      <div class="chead"><div class="chip">🌙</div><div class="ctitle">Sleep</div><div class="tag">Last 7 nights</div></div>
      <div class="row"><span class="num big" id="sleepH">—</span><span class="unit">h</span><span class="num" id="sleepM" style="font-size:22px;color:var(--text-dim)"></span><span class="delta" id="sleepDelta" style="margin-left:auto"></span></div>
      <svg class="chart" id="sleepChart" viewBox="0 0 100 50" preserveAspectRatio="none" aria-hidden="true"></svg>
      <div class="note">Estimated · charging + do not disturb</div>
    </section>

    <!-- GYM -->
    <section class="card gym">
      <div class="chead"><div class="chip">🏋️</div><div class="ctitle">Gym</div><div class="tag">This week</div></div>
      <div class="body">
        <div class="gring">
          <svg width="104" height="104" viewBox="0 0 104 104" aria-hidden="true">
            <circle cx="52" cy="52" r="44" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="7"/>
            <circle id="gymArc" cx="52" cy="52" r="44" fill="none" stroke="url(#gymg)" stroke-width="7" stroke-linecap="round"
                    transform="rotate(-90 52 52)" pathLength="100" stroke-dasharray="0 100" style="transition:stroke-dasharray .8s cubic-bezier(.2,.8,.3,1)"/>
            <g id="gymTicks"></g>
            <defs><linearGradient id="gymg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="var(--c-gym)"/><stop offset="1" stop-color="var(--c-gym2)"/></linearGradient></defs>
          </svg>
          <div class="center"><div class="num"><span id="gym">0</span><span class="sub">/<span id="gymGoal">5</span></span></div></div>
        </div>
        <div>
          <div class="foot" id="gymFoot">—</div>
        </div>
      </div>
    </section>

    <!-- HERO GAUGE -->
    <section class="card hero">
      <div class="iconrow"><span class="ic">🏃</span><span class="ic">🚶</span><span class="ic">🏋️</span><span class="ic">🌙</span><span class="ic">📈</span></div>
      <div class="gauge">
        <div class="gwrap">
          <svg viewBox="0 0 200 116" width="100%" aria-hidden="true">
            <path d="M16,108 A92,92 0 0 1 184,108" fill="none" stroke="rgba(255,255,255,.10)" stroke-width="6.5" stroke-linecap="round" pathLength="100"/>
            <path id="gaugeArc" d="M16,108 A92,92 0 0 1 184,108" fill="none" stroke="url(#gg)" stroke-width="6.5" stroke-linecap="round"
                  pathLength="100" stroke-dasharray="0 100" style="transition:stroke-dasharray .8s cubic-bezier(.2,.7,.2,1)"/>
            <g id="ticks"></g>
            <defs><linearGradient id="gg" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0" stop-color="var(--accent)"/><stop offset="1" stop-color="var(--accent-2)"/>
            </linearGradient></defs>
          </svg>
          <div class="gval"><span class="num" id="score">0</span><span class="pct">%</span></div>
        </div>
      </div>
      <div class="gcap" id="scoreCap">On track</div>
      <div class="gsub">Weekly consistency · gym · walks · steps</div>
    </section>

    <!-- WALK -->
    <section class="card walk">
      <div class="chead"><div class="chip">🚶</div><div class="ctitle">Daily walk</div><div class="tag">Today</div></div>
      <div class="body">
        <svg class="ring" id="walkRing" width="80" height="80" viewBox="0 0 80 80" aria-hidden="true">
          <circle cx="40" cy="40" r="34" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="6"/>
          <circle id="walkArc" cx="40" cy="40" r="34" fill="none" stroke="url(#walkg)" stroke-width="6"
                  stroke-linecap="round" transform="rotate(-90 40 40)"
                  stroke-dasharray="213.6" stroke-dashoffset="213.6" style="transition:stroke-dashoffset .7s cubic-bezier(.2,.7,.2,1)"/>
          <defs><linearGradient id="walkg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="var(--c-walk)"/><stop offset="1" stop-color="var(--c-walk2)"/></linearGradient></defs>
        </svg>
        <div>
          <div class="state" id="walkState">Open</div>
          <div class="sub" id="walkSub">—</div>
        </div>
        <div class="week" id="walkWeek"></div>
        <div class="streak"><div class="num" id="streak">0</div><div class="lbl" id="consistency">—</div></div>
      </div>
    </section>

    <!-- MOVEMENT CLOCK -->
    <section class="card clock">
      <div class="chead"><div class="chip">⏱️</div><div class="ctitle">Movement clock</div><div class="tag">Your rhythm</div></div>
      <div class="bars" id="clockBars"></div>
      <div class="axis"><span>6am</span><span>noon</span><span>6pm</span><span>11pm</span></div>
      <div class="foot" id="clockInsight">—</div>
    </section>
  </main>
  <div class="stale" id="stale"></div>

  <div id="overlay" hidden>
    <div class="sheet">
      <div class="ovhead"><div id="ovChip" class="chip"></div><h2 id="ovTitle"></h2><button id="ovClose" aria-label="Close">✕</button></div>
      <div id="ovBody"></div>
    </div>
  </div>

<script>
// ---- config ------------------------------------------------------------
const GOAL = { gym:5, steps:8000, sleep:7.5, walkSteps:7000 };
const $ = id => document.getElementById(id);
const todayKey = d => { const x=d||new Date(); return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0')+'-'+String(x.getDate()).padStart(2,'0'); };
const num = n => { const x=Number(n); return Number.isFinite(x)?x:0; };
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
// silent refresh: a Firebase-triggered reload must not replay the entrance/count-up
const silent = sessionStorage.getItem('strideSilent')==='1'; sessionStorage.removeItem('strideSilent');
if(silent) document.documentElement.classList.add('silent');
// === Paste your Firebase Realtime Database URL here to turn on always-on cross-device sync ===
// e.g. 'https://stride-xxxx-default-rtdb.firebaseio.com'  (leave '' for local / URL-param mode)
const FIREBASE_URL = '';
function countUp(el,to,fmt){ fmt=fmt||(v=>Math.round(v));
  if(reduce||silent||!to){ el.textContent=fmt(to); return; }
  const start=performance.now(),dur=900;
  (function tick(t){ const p=Math.min(1,(t-start)/dur),e=1-Math.pow(1-p,3); el.textContent=fmt(to*e); if(p<1) requestAnimationFrame(tick); })(start);
}
function weekId(d){ const x=new Date(d); const off=(x.getDay()+6)%7; x.setDate(x.getDate()-off); return todayKey(x); }

// ---- ingest ------------------------------------------------------------
const p = new URLSearchParams(location.search);
const has = k => p.has(k) && p.get(k)!=='';
let store={};
try{ const raw=JSON.parse(localStorage.getItem('stride')||'{}'); store=(raw&&typeof raw==='object'&&!Array.isArray(raw))?raw:{}; }catch(e){ store={}; }
if(!store.days || typeof store.days!=='object' || Array.isArray(store.days)) store.days={};
store.gymWeeks = (store.gymWeeks && typeof store.gymWeeks==='object') ? store.gymWeeks : {};
const now = new Date(); const key = todayKey(now);

if (p.toString().length>0){
  const today = store.days[key] || {};
  if (has('steps')) today.steps = num(p.get('steps'));
  if (has('dist'))  today.dist  = num(p.get('dist'));
  if (has('sleep')) today.sleep = num(p.get('sleep'));
  if (has('gym')){ const wk=weekId(now), v=num(p.get('gym'));
    if(store.gymWeek && store.gymWeek.week!==wk) store.gymWeeks[store.gymWeek.week]=store.gymWeek.count; // archive completed week
    store.gymWeek = { week: wk, count: (store.gymWeek && store.gymWeek.week===wk) ? Math.max(store.gymWeek.count, v) : v }; }
  if (has('hours')){ const a=p.get('hours').split(',').map(num); today.hours=Array.from({length:24},(_,i)=>num(a[i])); }
  if (has('walk'))  today.walkExplicit = today.walk = num(p.get('walk'))>0;
  else if (today.steps!=null && !today.walkExplicit && today.steps>=GOAL.walkSteps) today.walk = true; // latch on; a later low-steps sync can't un-fill it
  store.days[key] = today; store.updated = now.getTime();
  const cut=(()=>{const c=new Date(now);c.setDate(c.getDate()-1825);return todayKey(c);})(); // keep ~5y so months/years aggregates + all-time trophies persist (never resets)
  for(const d in store.days){ if(d<cut) delete store.days[d]; }
  try{ localStorage.setItem('stride', JSON.stringify(store)); }catch(e){}
}

// ---- view model --------------------------------------------------------
const day = store.days[key] || {};
const gym = (store.gymWeek && store.gymWeek.week===weekId(now)) ? store.gymWeek.count : 0;
const steps = num(day.steps), dist = num(day.dist), sleep = day.sleep||0, walkDone = !!day.walk;
function walkStreak(){ let n=0; const d=new Date(now);
  if(!store.days[todayKey(d)] || !store.days[todayKey(d)].walk) d.setDate(d.getDate()-1);
  for(;;){ const r=store.days[todayKey(d)]; if(r&&r.walk){n++;d.setDate(d.getDate()-1);} else break; } return n; }
function weekly(){ let done=0; const elapsed=((now.getDay()+6)%7)+1;
  for(let i=0;i<elapsed;i++){ const d=new Date(now); d.setDate(d.getDate()-i);
    const r=store.days[todayKey(d)]; if(r&&r.walk) done++; } return {done, elapsed}; }
const streak = walkStreak(), wc = weekly();

// ---- header ------------------------------------------------------------
$('date').textContent = now.toLocaleDateString(undefined,{weekday:'long',day:'numeric',month:'long'});

// ---- activity: cumulative steps area toward goal -----------------------
countUp($('steps'), steps, v=>Math.round(v).toLocaleString());
$('stepsGoal').textContent = '/ '+GOAL.steps.toLocaleString();
if(dist) countUp($('dist'), dist, v=>v.toFixed(1)); else $('dist').textContent='—';
(function(){ const h=day.hours||[]; const cum=[]; let s=0;
  for(let x=6;x<=23;x++){ s+=num(h[x]); cum.push(s); }
  const max=Math.max(GOAL.steps, s, 1);
  drawArea($('actChart'), cum, max, 'actg', GOAL.steps/max);
})();

// ---- sleep: 7-night area + weekly delta --------------------------------
(function(){ if(!sleep){ $('sleepH').textContent='—'; $('sleepM').textContent=''; return; }
  const m=Math.round(sleep*60); $('sleepH').textContent=Math.floor(m/60); $('sleepM').textContent=String(m%60).padStart(2,'0')+'m'; })();
(function(){
  const series=[]; for(let i=6;i>=0;i--){ const d=new Date(now); d.setDate(d.getDate()-i);
    const r=store.days[todayKey(d)]; series.push(r&&r.sleep?r.sleep:0); }
  drawArea($('sleepChart'), series, Math.max(GOAL.sleep,...series,1), 'sleepg', null, true);
  // delta: this 7 nights avg vs previous 7
  const avg=(a,b)=>{let s=0,n=0; for(let i=a;i<b;i++){const d=new Date(now);d.setDate(d.getDate()-i);const r=store.days[todayKey(d)]; if(r&&r.sleep){s+=r.sleep;n++;}} return n?s/n:null;};
  const tw=avg(0,7), pw=avg(7,14);
  if(tw!=null&&pw!=null){ const m=Math.round((tw-pw)*60); const el=$('sleepDelta');
    el.textContent=(m>=0?'+':'')+m+'m vs last week'; el.classList.toggle('down', m<0); }
})();

// ---- gym: segmented progress ring --------------------------------------
countUp($('gym'), gym); $('gymGoal').textContent = GOAL.gym;
$('gymFoot').textContent = gym>=GOAL.gym ? "That’s the week." : (GOAL.gym-gym)+" to go";
requestAnimationFrame(()=> $('gymArc').style.strokeDasharray = Math.min(100, gym/GOAL.gym*100)+' 100');
(function(){ const g=$('gymTicks'); let t=''; // 5 segment dividers
  for(let i=0;i<GOAL.gym;i++){ const a=-Math.PI/2 + i*(2*Math.PI/GOAL.gym);
    const x1=52+Math.cos(a)*40.5,y1=52+Math.sin(a)*40.5,x2=52+Math.cos(a)*47.5,y2=52+Math.sin(a)*47.5;
    t+=`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="rgba(12,13,16,.8)" stroke-width="3"/>`; }
  g.innerHTML=t; })();

// ---- hero gauge --------------------------------------------------------
(function(){
  let sum7=0,d7=0; for(let i=0;i<wc.elapsed;i++){ const d=new Date(now); d.setDate(d.getDate()-i);
    const r=store.days[todayKey(d)]; if(r&&r.steps!=null){ sum7+=r.steps; d7++; } }
  const gymPart=Math.min(1,gym/GOAL.gym), walkPart=wc.elapsed?wc.done/wc.elapsed:0, stepPart=d7?Math.min(1,(sum7/d7)/GOAL.steps):0;
  const score=Math.round(100*(0.4*gymPart+0.4*walkPart+0.2*stepPart));
  countUp($('score'), score);
  $('scoreCap').textContent = score>=80?'Strong week':score>=55?'On track':score>=30?'Building':'Early days';
  requestAnimationFrame(()=> $('gaugeArc').style.strokeDasharray = score+' 100');
  let t=''; const N=44; for(let i=0;i<=N;i++){ const a=Math.PI*(1-i/N);
    const x=100+Math.cos(a)*92,y=108-Math.sin(a)*92,x2=100+Math.cos(a)*84,y2=108-Math.sin(a)*84;
    t+=`<line x1="${x.toFixed(1)}" y1="${y.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="rgba(255,255,255,.08)" stroke-width="1.4"/>`; }
  $('ticks').innerHTML=t;
})();

// ---- walk: ring + 7-day history ----------------------------------------
$('walkState').textContent = walkDone?'Done':'Open';
$('walkState').classList.toggle('done', walkDone);
$('walkSub').textContent = walkDone?'Nice. Filled for today.':'A walk fills the ring.';
$('streak').textContent = streak;
$('consistency').textContent = wc.done+'/'+wc.elapsed+' this wk';
requestAnimationFrame(()=>{ $('walkArc').style.strokeDashoffset = walkDone?0:213.6; if(walkDone) $('walkArc').style.stroke='var(--good)'; });
(function(){ const w=$('walkWeek'); const init=['M','T','W','T','F','S','S']; let html='';
  for(let i=6;i>=0;i--){ const d=new Date(now); d.setDate(d.getDate()-i);
    const r=store.days[todayKey(d)]; const on=r&&r.walk; const today=i===0;
    html+=`<div class="d"><div class="dot${on?' on':''}${today?' today':''}"></div><div class="dl">${init[(d.getDay()+6)%7]}</div></div>`; }
  w.innerHTML=html; })();

// ---- movement clock ----------------------------------------------------
function fmtHour(h){ const ap=h<12?'am':'pm'; let x=h%12; if(x===0)x=12; return x+ap; }
(function(){
  const START=6,END=23; const sum=new Array(24).fill(0); let days=0;
  for(const d in store.days){ const h=store.days[d].hours; if(h&&h.length===24){ days++; for(let i=0;i<24;i++) sum[i]+=num(h[i]); } }
  const avg=sum.map(s=> days? s/days:0); const todayH=day.hours||[];
  const max=Math.max(1,...avg.slice(START,END+1));
  const ranked=[...Array(24).keys()].filter(h=>avg[h]>0).sort((a,b)=>avg[b]-avg[a]);
  const top=new Set(ranked.slice(0,4)); const cur=now.getHours();
  let suggest=null;
  if(!walkDone){ for(let h=Math.max(cur,START);h<=END;h++){ if(top.has(h)&&(todayH[h]||0)<avg[h]*0.4){suggest=h;break;} }
    if(suggest==null) for(let h=Math.max(cur,START);h<=END;h++){ if(top.has(h)){suggest=h;break;} } }
  const bars=$('clockBars'); bars.innerHTML='';
  for(let h=START;h<=END;h++){ const s=document.createElement('span'); let c=''; if(top.has(h))c='peak'; if(h===cur)c+=' now';
    s.className=c.trim(); s.title=fmtHour(h)+' · '+Math.round(avg[h])+' steps avg'; bars.appendChild(s);
    requestAnimationFrame(()=> s.style.height=Math.round((avg[h]/max)*100)+'%'); }
  const ins=$('clockInsight');
  if(days<3){ ins.textContent='Learning your rhythm — a few more synced days and I’ll spot when you usually move.'; return; }
  let line='Most days you move around <b>'+fmtHour(ranked[0])+'</b>.';
  if(walkDone) line+=' Walk’s done.'; else if(suggest!=null) line+=' Good window today: <b>~'+fmtHour(suggest)+'</b>.';
  ins.innerHTML=line;
})();

// ---- status ------------------------------------------------------------
(function(){ const pool=[];
  if(gym>=GOAL.gym) pool.push("That’s the week. <b>"+gym+" sessions.</b>");
  if(!walkDone) pool.push("Good day to move. <b>Walk’s still open.</b>");
  if(walkDone&&gym<GOAL.gym) pool.push("Walk done. <b>"+(GOAL.gym-gym)+" gym to go.</b>");
  if(walkDone&&gym>=GOAL.gym) pool.push("Walk done, week done. <b>Solid.</b>");
  if(streak>=3) pool.push("<b>"+streak+"-day</b> walk run going.");
  if(!pool.length) pool.push("Fresh day. <b>One walk to start.</b>");
  $('status').innerHTML = pool[ now.getDate() % pool.length ]; })();

// ---- celebration moments (once per event) ------------------------------
(function(){
  store.celebrated = store.celebrated || {}; const c = store.celebrated; const wk = weekId(now);
  const fireWalk = walkDone && c.walk !== key;
  const fireGym = gym>=GOAL.gym && c.gym !== wk;
  const ms=[7,14,30,60,100,150,200,365];
  const fireStreak = ms.includes(streak) && c.streak !== streak;
  if(fireWalk) c.walk=key; if(fireGym) c.gym=wk; if(fireStreak) c.streak=streak;
  if(fireWalk||fireGym||fireStreak){ try{ localStorage.setItem('stride',JSON.stringify(store)); }catch(e){} }
  if(!reduce){
    if(fireWalk) $('walkRing').classList.add('celebrate');
    if(fireGym) document.querySelector('.hero').classList.add('celebrate');
    if(fireStreak) document.querySelector('.walk .streak').classList.add('celebrate');
  }
})();

// ---- staleness ---------------------------------------------------------
if(store.updated){ const hrs=(Date.now()-store.updated)/3.6e6;
  if(hrs>20){ const s=$('stale'); s.textContent='Last synced '+Math.round(hrs)+'h ago — open the iPhone shortcut to refresh.'; s.classList.add('show'); } }

// ---- time-of-day sky (the background acts as a clock) ------------------
function setSky(){
  // [hour, [r,g,b,a]] top-of-sky tint stops across the day
  const S=[[0,[8,12,30,.78]],[6,[55,52,92,.5]],[8,[255,150,95,.3]],[11,[150,180,222,.14]],
           [15,[255,205,150,.16]],[18,[240,110,60,.38]],[20,[150,55,70,.42]],[22,[22,24,52,.66]],[24,[8,12,30,.78]]];
  const dn=new Date(); const h=dn.getHours()+dn.getMinutes()/60;
  let a=S[0],b=S[S.length-1];
  for(let i=0;i<S.length-1;i++){ if(h>=S[i][0]&&h<=S[i+1][0]){ a=S[i]; b=S[i+1]; break; } }
  const t=(h-a[0])/((b[0]-a[0])||1);
  const c=a[1].map((v,i)=> v + (b[1][i]-v)*t);
  document.documentElement.style.setProperty('--sky-top', `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${c[3].toFixed(3)})`);
}
setSky();
setInterval(setSky, 60000);
// always-on iPad background: keep the day/week correct without a manual refresh
(function(){
  const n=new Date(); const msToMidnight=new Date(n.getFullYear(),n.getMonth(),n.getDate()+1,0,0,5)-n;
  setTimeout(()=>location.reload(), msToMidnight);                       // roll the day at local midnight
  const guard=()=>{ if(!document.hidden && todayKey(new Date())!==key) location.reload(); };
  document.addEventListener('visibilitychange', guard);                  // iPad woke / refocused on a new day
  window.addEventListener('pageshow', e=>{ if(e.persisted && todayKey(new Date())!==key) location.reload(); });
  // also refresh the staleness banner periodically so a long-idle instance shows it
  setInterval(()=>{ if(store.updated){ const hrs=(Date.now()-store.updated)/3.6e6; const s=$('stale');
    if(hrs>20){ s.textContent='Last synced '+Math.round(hrs)+'h ago — open the iPhone shortcut to refresh.'; s.classList.add('show'); } } }, 600000);
})();

// ---- slow ambient background (half speed = calmer breath) --------------
(function(){ const v=document.getElementById('bgvideo'); if(!v) return;
  const slow=()=>{ try{ v.playbackRate=0.5; }catch(e){} };
  slow(); v.addEventListener('loadedmetadata',slow); v.addEventListener('play',slow); })();

// ---- Firebase live sync (always-on, both devices, no manual refresh) ----
function applyRemote(remote){
  if(!remote || typeof remote!=='object' || !remote.days) return;
  if(remote.updated && remote.updated===store.updated) return;        // nothing new since last paint
  try{ const merged=Object.assign({}, remote, {celebrated: store.celebrated||remote.celebrated||{}}); localStorage.setItem('stride', JSON.stringify(merged)); }catch(e){}
  sessionStorage.setItem('strideSilent','1'); location.reload();      // seamless re-render with fresh data (celebration state preserved)
}
function pollFirebase(){ if(!FIREBASE_URL) return;
  fetch(FIREBASE_URL.replace(/\/+$/,'')+'/stride.json',{cache:'no-store'})
    .then(r=> r.ok ? r.json() : null).then(applyRemote).catch(()=>{});
}
if(FIREBASE_URL){ pollFirebase(); setInterval(pollFirebase, 60000); }

// ---- shared area-chart drawer ------------------------------------------
function drawArea(svg, vals, max, gid, goalFrac, dots){
  const W=100,H=50,pad=3;
  const xs=i=> pad + i*((W-2*pad)/((vals.length-1)||1));
  const ys=v=> H-pad - (Math.min(v,max)/max)*(H-2*pad);
  let line='', started=false;
  vals.forEach((v,i)=>{ const X=xs(i).toFixed(1),Y=ys(v).toFixed(1); line+=(started?'L':'M')+X+' '+Y+' '; started=true; });
  const area = vals.length? `M${xs(0).toFixed(1)} ${H-pad} `+vals.map((v,i)=>'L'+xs(i).toFixed(1)+' '+ys(v).toFixed(1)).join(' ')+` L${xs(vals.length-1).toFixed(1)} ${H-pad} Z` : '';
  const goal = goalFrac!=null ? `<line x1="${pad}" y1="${ys(goalFrac*max).toFixed(1)}" x2="${W-pad}" y2="${ys(goalFrac*max).toFixed(1)}" stroke="rgba(255,255,255,.34)" stroke-width="1" stroke-dasharray="3 3"/>` : '';
  const pts = dots ? vals.map((v,i)=> v>0?`<circle cx="${xs(i).toFixed(1)}" cy="${ys(v).toFixed(1)}" r="${i===vals.length-1?2.2:1.4}" fill="${i===vals.length-1?'var(--cb)':'rgba(255,255,255,.7)'}"/>`:'').join('') : '';
  svg.innerHTML =
    `<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--ca)" stop-opacity=".45"/><stop offset="1" stop-color="var(--ca)" stop-opacity="0"/></linearGradient></defs>`
    + (area?`<path d="${area}" fill="url(#${gid})"/>`:'') + goal
    + (line?`<path d="${line}" fill="none" stroke="var(--cb)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>`:'')
    + pts;
}

const ICONS={

const icon=(n,sz)=>`<svg viewBox="0 0 24 24" width="${sz||20}" height="${sz||20}" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">${ICONS[n]||''}</svg>`;
const ICON_OF={activity:'activity',sleep:'moon',gym:'dumbbell',hero:'gauge',walk:'footprints',clock:'clock'};
const DOW=['M','T','W','T','F','S','S'];
const dl = d => DOW[(d.getDay()+6)%7];
const fmtH = h => { const ap=h<12?'a':'p'; let x=h%12; if(x===0)x=12; return x+ap; };
function fmtHrs(x){ if(!x) return '—'; const m=Math.round(x*60); return Math.floor(m/60)+'h '+String(m%60).padStart(2,'0'); }
function ld(nn){ const out=[]; for(let i=nn-1;i>=0;i--){ const d=new Date(); d.setDate(d.getDate()-i); const k=todayKey(d); out.push({d,k,r:store.days[k]||{}}); } return out; }
function ovbars(items){ const max=Math.max(...items.map(x=>x.v),1);
  return '<div class="ovbars">'+items.map(x=>`<div class="b"><div class="bar${x.v?'':' dim'}" style="height:${x.v?Math.max(3,Math.round(x.v/max*100)):2}%;${x.hi?'box-shadow:0 0 0 2px var(--cb),0 0 12px var(--ca);':''}"></div><div class="bl">${x.lbl||''}</div></div>`).join('')+'</div>'; }
const stat=(n,l)=>`<div class="ovstat"><div class="n">${n}</div><div class="l">${l}</div></div>`;
function longestStreak(){ const keys=Object.keys(store.days).filter(k=>store.days[k].walk).sort();
  let best=0,run=0,prev=null; keys.forEach(k=>{ if(prev){ const diff=Math.round((new Date(k+'T00:00')-new Date(prev+'T00:00'))/86400000); run=diff===1?run+1:1; } else run=1; prev=k; if(run>best)best=run; }); return best; }
function monthPct(){ const n=new Date(); let done=0; for(let day=1;day<=n.getDate();day++){ const r=store.days[todayKey(new Date(n.getFullYear(),n.getMonth(),day))]; if(r&&r.walk) done++; } return Math.round(done/n.getDate()*100); }
function weeklyNow(){ const n=new Date(); let done=0; const elapsed=((n.getDay()+6)%7)+1; for(let i=0;i<elapsed;i++){ const d=new Date(n); d.setDate(d.getDate()-i); const r=store.days[todayKey(d)]; if(r&&r.walk) done++; } return {done,elapsed}; }

// aggregate the daily history into weeks / months (for months & years views)
function aggWeeks(nWeeks){ const out=[]; const n=new Date();
  for(let i=nWeeks-1;i>=0;i--){ const m=new Date(n); m.setDate(n.getDate()-((n.getDay()+6)%7)-i*7);
    let steps=0,sS=0,sN=0,walks=0,days=0;
    for(let d=0;d<7;d++){ const dt=new Date(m); dt.setDate(m.getDate()+d); if(dt>n) break; const r=store.days[todayKey(dt)]; if(r){ days++; steps+=num(r.steps); if(r.sleep){sS+=r.sleep;sN++;} if(r.walk)walks++; } }
    out.push({lbl:m.getDate()+'/'+(m.getMonth()+1), stepAvg:days?steps/days:0, sleepAvg:sN?sS/sN:0, walks, days}); }
  return out; }
function aggMonths(nMonths){ const out=[]; const n=new Date(); const M=['J','F','M','A','M','J','J','A','S','O','N','D'];
  for(let i=nMonths-1;i>=0;i--){ const d=new Date(n.getFullYear(),n.getMonth()-i,1); const pref=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    let steps=0,sS=0,sN=0,walks=0,days=0;
    for(const k in store.days){ if(k.indexOf(pref)===0){ const r=store.days[k]; days++; steps+=num(r.steps); if(r.sleep){sS+=r.sleep;sN++;} if(r.walk)walks++; } }
    out.push({lbl:M[d.getMonth()], stepAvg:days?steps/days:0, sleepAvg:sN?sS/sN:0, walks, days}); }
  return out; }

// trophies — computed from full history, so they're earned-once and never reset
const TROPHIES=[
  {e:'🚶',t:'First walk',test:h=>h.walkDays>=1},
  {e:'🔥',t:'7-day streak',test:h=>h.bestStreak>=7},
  {e:'⭐',t:'30-day streak',test:h=>h.bestStreak>=30},
  {e:'🏅',t:'100-day streak',test:h=>h.bestStreak>=100},
  {e:'👟',t:'10k-step day',test:h=>h.bestSteps>=10000},
  {e:'💪',t:'50k-step week',test:h=>h.bestWeekSteps>=50000},
  {e:'🏋️',t:'Full gym week',test:h=>h.bestGymWeek>=GOAL.gym},
  {e:'🏆',t:'4 gym weeks',test:h=>h.gymGoalWeeks>=4}
];
function historyStats(){ const ks=Object.keys(store.days); let walkDays=0,bestSteps=0;
  ks.forEach(k=>{ const r=store.days[k]; if(r.walk)walkDays++; if(num(r.steps)>bestSteps)bestSteps=num(r.steps); });
  const wk={}; ks.forEach(k=>{ const w=weekId(new Date(k+'T00:00')); wk[w]=(wk[w]||0)+num(store.days[k].steps); });
  const bestWeekSteps=Math.max(0,...Object.values(wk));
  const gyms=Object.values(store.gymWeeks||{}).map(Number); if(store.gymWeek) gyms.push(num(store.gymWeek.count));
  return {walkDays,bestSteps,bestStreak:longestStreak(),bestWeekSteps,bestGymWeek:Math.max(0,...gyms),gymGoalWeeks:gyms.filter(c=>c>=GOAL.gym).length}; }
function trophyShelf(){ const h=historyStats(); const got=TROPHIES.filter(t=>t.test(h)).length;
  return `<div class="ovrow" style="margin-top:20px"><span>Trophy shelf</span><span style="color:var(--text-faint);font-size:12px">${got}/${TROPHIES.length} earned</span></div>`
    +'<div class="shelf">'+TROPHIES.map(t=>{ const on=t.test(h); return `<div class="trophy${on?'':' locked'}"><div class="te">${t.e}</div><div class="tl">${t.t}</div></div>`; }).join('')+'</div>'; }

const RANGES={ activity:['14d','12wk','12mo'], sleep:['14d','12wk','12mo'], walk:['8wk','1yr'] };
const RLABEL={'14d':'14 days','12wk':'12 weeks','12mo':'12 months','8wk':'8 weeks','1yr':'Year'};

const RENDER={
  activity(range){ range=range||'14d';
    if(range==='14d'){ const ds=ld(14); const v=ds.map(x=>num(x.r.steps)); const best=Math.max(...v,0);
      const avg=Math.round(v.reduce((a,b)=>a+b,0)/14); const km=ds.reduce((a,x)=>a+num(x.r.dist),0);
      return ovbars(ds.map(x=>({v:num(x.r.steps),lbl:dl(x.d),hi:best>0&&num(x.r.steps)===best})))
        +`<div class="ovstats">${stat(avg.toLocaleString(),'14-day avg')}${stat(best.toLocaleString(),'best day')}${stat(km.toFixed(1)+' km','distance')}</div>`; }
    const A=range==='12wk'?aggWeeks(12):aggMonths(12); const best=Math.max(0,...A.map(x=>x.stepAvg));
    const days=A.filter(x=>x.days); const avg=days.length?Math.round(days.reduce((a,b)=>a+b.stepAvg,0)/days.length):0;
    return ovbars(A.map(x=>({v:Math.round(x.stepAvg),lbl:x.lbl,hi:x.stepAvg>0&&x.stepAvg===best})))
      +`<div class="ovstats">${stat(avg.toLocaleString(),'avg steps/day')}${stat(Math.round(best).toLocaleString(),'best '+(range==='12wk'?'week':'month'))}</div>`; },
  sleep(range){ range=range||'14d';
    if(range==='14d'){ const ds=ld(14); const v=ds.map(x=>x.r.sleep||0); const have=v.filter(x=>x>0);
      const avg=have.length?have.reduce((a,b)=>a+b,0)/have.length:0; const best=Math.max(...v,0); const worst=have.length?Math.min(...have):0;
      return ovbars(ds.map(x=>({v:x.r.sleep||0,lbl:dl(x.d)})))
        +`<div class="ovstats">${stat(fmtHrs(avg),'14-night avg')}${stat(fmtHrs(best),'longest')}${stat(fmtHrs(worst),'shortest')}</div>`
        +`<div class="note" style="margin-top:14px">Estimated · charging + do not disturb</div>`; }
    const A=range==='12wk'?aggWeeks(12):aggMonths(12); const have=A.filter(x=>x.sleepAvg>0);
    const avg=have.length?have.reduce((a,b)=>a+b.sleepAvg,0)/have.length:0; const best=Math.max(0,...A.map(x=>x.sleepAvg));
    return ovbars(A.map(x=>({v:x.sleepAvg,lbl:x.lbl})))
      +`<div class="ovstats">${stat(fmtHrs(avg),'avg/night')}${stat(fmtHrs(best),'best '+(range==='12wk'?'week':'month'))}</div>`
      +`<div class="note" style="margin-top:14px">Estimated · charging + do not disturb</div>`; },
  gym(){ const wkk=weekId(new Date()); const cur=(store.gymWeek&&store.gymWeek.week===wkk)?store.gymWeek.count:0;
    const hist=Object.entries(store.gymWeeks||{}).sort((a,b)=>a[0]<b[0]?-1:1).slice(-11);
    const all=hist.concat([[wkk,cur]]);
    const hits=all.filter(([,c])=>c>=GOAL.gym).length;
    let h=ovbars(all.map(([w,c])=>({v:c,lbl:w.slice(8)+'/'+w.slice(5,7),hi:c>=GOAL.gym})))
      +`<div class="ovstats">${stat(cur+'/'+GOAL.gym,'this week')}${stat(hits,'weeks at goal')}</div>`;
    if(all.length<=1) h+=`<div class="note" style="margin-top:14px">Weekly history builds from here as you keep syncing.</div>`;
    return h; },
  walk(range){ range=range||'8wk'; const span=range==='1yr'?364:56;
    const ds=ld(span); const firstDow=(ds[0].d.getDay()+6)%7; let pad=''; for(let i=0;i<firstDow;i++) pad+='<div class="c" style="visibility:hidden"></div>';
    const cells=ds.map(x=>`<div class="c${x.r.walk?' on':''}" title="${x.k}"></div>`).join('');
    return `<div class="heat${range==='1yr'?' yr':''}">${pad}${cells}</div><div class="ovstats">${stat(streak,'current streak')}${stat(longestStreak(),'longest')}${stat(monthPct()+'%','this month')}</div>`; },
  clock(){ const sum=new Array(24).fill(0); let dys=0; for(const k in store.days){ const h=store.days[k].hours; if(h&&h.length===24){ dys++; for(let i=0;i<24;i++) sum[i]+=num(h[i]); } }
    const avg=sum.map(s=>dys?s/dys:0);
    const ranked=[...Array(24).keys()].filter(i=>avg[i]>0).sort((a,b)=>avg[b]-avg[a]).slice(0,3);
    return ovbars(avg.map((v,i)=>({v,lbl:i%6===0?fmtH(i):''})))
      +`<div class="ovstats">${stat(dys,'days learned')}${stat(ranked.length?ranked.map(fmtH).join('  '):'—','top windows')}</div>`; },
  hero(){ const wkk=weekId(new Date()); const w=weeklyNow();
    const gymc=(store.gymWeek&&store.gymWeek.week===wkk)?store.gymWeek.count:0;
    let s7=0,d7=0; for(let i=0;i<w.elapsed;i++){ const d=new Date(); d.setDate(d.getDate()-i); const r=store.days[todayKey(d)]; if(r&&r.steps!=null){s7+=r.steps;d7++;} }
    const gP=Math.min(1,gymc/GOAL.gym), wP=w.elapsed?w.done/w.elapsed:0, sP=d7?Math.min(1,(s7/d7)/GOAL.steps):0;
    const score=Math.round(100*(0.4*gP+0.4*wP+0.2*sP));
    const comp=(l,f,wt,c)=>`<div class="ovrow"><span>${l} · <b>${Math.round(f*100)}%</b></span><span style="color:var(--text-faint);font-size:12px">weight ${wt}</span></div><div class="compbar"><i style="width:${Math.round(f*100)}%;background:${c}"></i></div>`;
    return `<div class="ovstat" style="margin-bottom:10px"><div class="n">${score}%</div><div class="l">weekly consistency</div></div>`
      +comp('Gym',gP,'40%','var(--c-gym)')+comp('Walks',wP,'40%','var(--c-walk)')+comp('Steps',sP,'20%','var(--c-act)')+trophyShelf(); }
};

function ovRender(id,range){ const body=$('ovBody'); const opts=RANGES[id];
  const bar = opts ? '<div class="ovtabs">'+opts.map(r=>`<button class="ovtab${r===range?' on':''}" data-r="${r}">${RLABEL[r]||r}</button>`).join('')+'</div>' : '';
  body.innerHTML=bar+RENDER[id](range);
  if(opts) body.querySelectorAll('.ovtab').forEach(b=>b.addEventListener('click',()=>ovRender(id,b.dataset.r)));
}
function openOverlay(id){ const ov=$('overlay'), sheet=ov.querySelector('.sheet');
  const cs=getComputedStyle(document.querySelector('.'+id));
  sheet.style.setProperty('--ca', cs.getPropertyValue('--ca').trim()||'#FF6A2C');
  sheet.style.setProperty('--cb', cs.getPropertyValue('--cb').trim()||'#FFA63D');
  $('ovChip').innerHTML=icon(ICON_OF[id]); $('ovTitle').textContent=OV_TITLE[id];
  ovRender(id, RANGES[id]?RANGES[id][0]:undefined); ov.hidden=false;
}
function closeOverlay(){ $('overlay').hidden=true; }
$('ovClose').addEventListener('click', closeOverlay);
$('overlay').addEventListener('click', e=>{ if(e.target.id==='overlay') closeOverlay(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeOverlay(); });
['activity','sleep','gym','hero','walk','clock'].forEach(id=>{ const c=document.querySelector('.'+id); if(!c) return;
  const ch=c.querySelector('.chip'); if(ch) ch.innerHTML=icon(ICON_OF[id]);
  c.setAttribute('role','button'); c.setAttribute('tabindex','0');
  c.addEventListener('click', ()=>openOverlay(id));
  c.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); openOverlay(id); } });
});
(function(){ const ics=document.querySelectorAll('.hero .ic'); const names=['activity','footprints','dumbbell','moon','gauge'];
  ics.forEach((el,i)=>{ if(names[i]) el.innerHTML=icon(names[i],15); }); })();
</script>
